<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonar Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-area">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="uiOverlay" class="ui-layer">
                <h1>Sonar Escape</h1>
                <p>Use WASD/Arrows to move. SPACE to ping.</p>
                <button id="startBtn">Start Game</button>
            </div>
            <div id="gameOverScreen" class="hidden overlay">
                <h2>Escaped!</h2>
                <p>Time: <span id="finalTime"></span>s</p>
                <input type="text" id="playerName" placeholder="Enter Name" maxlength="20">
                <button id="saveScoreBtn">Save Time</button>
                <button id="restartBtn">Play Again</button>
            </div>
            <div id="hud">Time: <span id="currentTime">0.0</span>s</div>
        </div>
        
        <div class="score-board">
            <h3>Fastest Escapes</h3>
            <ul id="leaderboard"></ul>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
