<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonar Escape</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><ellipse cx='16' cy='18' rx='10' ry='6' fill='%234CAF50' /><rect x='14' y='10' width='4' height='6' fill='%232e7d32' /><rect x='18' y='11' width='3' height='1' fill='%232e7d32' /><path d='M6 18 L2 14 L2 22 Z' fill='%234CAF50' /></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                
                <div id="uiOverlay" class="ui-layer">
                    <h1>Sonar Escape</h1>
                    <p>Use WASD/Arrows to move. SPACE to ping. SHIFT or CLICK to fire Torpedo.</p>
                    <div class="difficulty-select">
                        <label><input type="radio" name="difficulty" value="easy" checked> Easy (Unlimited Pings, Torpedo Reload: 10s)</label><br>
                        <label><input type="radio" name="difficulty" value="medium"> Medium (25 Pings, Torpedo Reload: 30s)</label><br>
                        <label><input type="radio" name="difficulty" value="hard"> Hard (10 Pings, Torpedo Reload: 60s)</label>
                    </div>
                    <p class="penalty-text">Medium/Hard: +3s penalty per extra ping used.</p>
                    <p class="penalty-text">Torpedoes destroy mines.</p>
                    <button id="startBtn">Start Game</button>
                </div>

                <div id="gameOverScreen" class="hidden overlay">
                    <h2 id="endGameTitle">Escaped!</h2>
                    <div class="stats-box" id="statsBox">
                        <p>Base Time: <span id="baseTime"></span>s</p>
                        <p>Ping Penalty: <span id="penaltyTime"></span>s</p>
                        <h3 class="total-score">Total Time: <span id="finalTime"></span>s</h3>
                    </div>
                    <input type="text" id="playerName" placeholder="Enter Name" maxlength="20">
                    <button id="saveScoreBtn">Save Time</button>
                    <button id="restartBtn">Play Again</button>
                </div>

                <!-- Mobile Controls Overlay -->
                <div id="mobile-controls" class="hidden">
                    <div id="joystick-container">
                        <div id="joystick-base">
                            <div id="joystick-knob"></div>
                        </div>
                    </div>
                    <div id="action-btns">
                        <button id="btn-ping" class="action-btn">PING</button>
                        <button id="btn-fire" class="action-btn">FIRE</button>
                    </div>
                </div>
            </div>
            
            <div id="hud-panel">
                <div id="hud-left">
                    <span>Health: <span id="healthCount">♥♥♥</span></span>
                    <span>Time: <span id="currentTime">0.0</span>s</span>
                </div>
                <div id="hud-right">
                    <span>Pings: <span id="pingCount">Unlimited</span></span>
                    <span>Torpedo: <canvas id="torpedoUICanvas" width="40" height="15" style="vertical-align: middle;"></canvas></span>
                </div>
            </div>
        </div>
        
        <div class="score-board">
            <h3>Fastest Escapes</h3>
            <ul id="leaderboard"></ul>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
